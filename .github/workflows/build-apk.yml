name: Build APK

# Triggered by the Next.js app via the GitHub "repository_dispatch" API.
on:
  repository_dispatch:
    types: [build-apk]

permissions:
  contents: write # needed to publish the release with the APK asset

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Scaffold Capacitor project & build APK
        env:
          TARGET_URL: ${{ github.event.client_payload.url }}
          APP_NAME: ${{ github.event.client_payload.appName }}
          APP_ID: ${{ github.event.client_payload.appId }}
          BUILD_ID: ${{ github.event.client_payload.buildId }}
        run: |
          set -euo pipefail
          echo "Building APK for: $TARGET_URL  (id=$APP_ID)"

          mkdir apkbuild && cd apkbuild
          npm init -y >/dev/null

          # Capacitor 6 toolchain
          npm install @capacitor/core@6 @capacitor/cli@6 @capacitor/android@6

          # webDir must exist; a tiny fallback page in case the remote URL fails to load
          mkdir www
          cat > www/index.html <<HTML
          <!doctype html><meta charset="utf-8">
          <meta http-equiv="refresh" content="0; url=${TARGET_URL}">
          <title>${APP_NAME}</title>
          <body style="font-family:sans-serif">Loading ${APP_NAME}…</body>
          HTML

          # Point the app's WebView at the live website via server.url
          cat > capacitor.config.json <<JSON
          {
            "appId": "${APP_ID}",
            "appName": "${APP_NAME}",
            "webDir": "www",
            "server": {
              "url": "${TARGET_URL}",
              "cleartext": true,
              "androidScheme": "https"
            }
          }
          JSON

          # Generate the native Android project and compile a debug APK
          npx cap add android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

          cd "$GITHUB_WORKSPACE"
          cp apkbuild/android/app/build/outputs/apk/debug/app-debug.apk \
             "${APP_NAME// /_}-${BUILD_ID}.apk"
          echo "APK_FILE=${APP_NAME// /_}-${BUILD_ID}.apk" >> "$GITHUB_ENV"

      - name: Publish release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.event.client_payload.buildId }}
          name: APK ${{ github.event.client_payload.appName }} (${{ github.event.client_payload.buildId }})
          body: |
            Website-to-APK build for ${{ github.event.client_payload.url }}
            Debug-signed. Sideload on Android (enable "Install unknown apps").
          files: ${{ env.APK_FILE }}
